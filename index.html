<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Table App</title>
    <style>
        body { font-family: 'Noto Sans Thai', sans-serif; padding: 20px; line-height: 1.6; background-color: #f4f4f9; }
        textarea { width: 100%; height: 150px; margin-bottom: 10px; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>วิเคราะห์ข้อมูลตาราง</h1>
    <textarea id="inputText" placeholder="วางข้อมูลที่นี่..."></textarea>
    <br>
    <button onclick="analyzeData()">วิเคราะห์ด้วย AI</button>
    <div id="result"></div>

    <script>
        async function analyzeData() {
            const text = document.getElementById('inputText').value;
            const resultDiv = document.getElementById('result');
            resultDiv.innerText = "กำลังวิเคราะห์...";

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error);
                
                resultDiv.innerText = "ผลลัพธ์: " + JSON.stringify(data.raw, null, 2);
            } catch (err) {
                resultDiv.innerText = "เกิดข้อผิดพลาด: " + err.message;
            }
        }
    </script>
</body>
</html>
