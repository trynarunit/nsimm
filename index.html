<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <style>
    body { background: #0A1120; color: #E2E8F0; font-family: sans-serif; padding: 20px; line-height: 1.5; }
    .table-wrapper { background: #1E293B; padding: 20px; border-radius: 12px; margin-top: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; border: 1px solid #334155; text-align: center; }
    th { background: #334155; }
    .controls { margin-bottom: 20px; }
    button { padding: 10px 20px; cursor: pointer; background: #3B82F6; color: white; border: none; border-radius: 6px; }
    textarea { width: 100%; height: 100px; background: #0F172A; color: white; border: 1px solid #334155; padding: 10px; box-sizing: border-box; }
  </style>
</head>
<body>
  <div class="controls">
    <button onclick="document.getElementById('importModal').style.display='flex'">🤖 นำเข้าข้อมูล</button>
  </div>
  <div id="table1Container" class="table-wrapper">
    <table id="table1">
      <thead>
        <tr><th>วันที่</th><th>ค่า</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div id="importModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); align-items:center; justify-content:center;">
    <div style="background:#1E293B; padding:20px; border-radius:12px; width:400px;">
      <textarea id="importText" placeholder="วางข้อมูลที่นี่..."></textarea>
      <div style="margin-top:10px;">
        <button onclick="analyzeImport()">✨ วิเคราะห์ด้วย AI</button>
        <button onclick="document.getElementById('importModal').style.display='none'">ปิด</button>
      </div>
      <div id="importError" style="color:#F87171; margin-top:10px;"></div>
    </div>
  </div>

  <script>
    async function analyzeImport() {
      const text = document.getElementById('importText').value;
      const errorDiv = document.getElementById('importError');
      // ใส่ API_KEY ของจริงของคุณตรงนี้แทนที่ข้อความด้านล่างค่ะ
      const API_KEY = "AQ.Ab8RN6KbwAvJDEgx1FZ-XYklc2WXUsEZytm7fK710xci2v18eQ";
      
      if(!text.trim()) { errorDiv.innerText = 'กรุณาใส่ข้อมูล'; return; }
      errorDiv.innerText = '🔄 กำลังวิเคราะห์...';

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: "แปลงข้อมูลตารางนี้เป็น JSON array ของ object ที่มี date (YYYY-MM-DD) และ values (array of numbers): " + text }] }] })
        });
        const dataRes = await response.json();
        const rawText = dataRes.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
        const parsed = JSON.parse(rawText);
        
        const tbody = document.querySelector('#table1 tbody');
        parsed.forEach(p => {
          const row = tbody.insertRow();
          row.insertCell(0).innerText = p.date;
          row.insertCell(1).innerText = p.values.join(', ');
        });
        
        document.getElementById('importModal').style.display = 'none';
        errorDiv.innerText = '';
      } catch(e) { errorDiv.innerText = 'พลาดที่: ' + e.message; }
    }
  </script>
</body>
</html>
