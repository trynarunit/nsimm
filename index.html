<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ตารางสรุปข้อมูล</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Sarabun', Arial, sans-serif;
      background: #0A1120;
      color: #E2E8F0;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    header { margin-bottom: 30px; }
    h1 { font-size: 28px; margin-bottom: 10px; }
    .controls { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
    button { 
      padding: 10px 16px; 
      border: none; 
      border-radius: 8px; 
      cursor: pointer; 
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-primary { background: #3B82F6; color: white; }
    .btn-primary:hover { background: #2563EB; }
    .btn-success { background: #10B981; color: white; }
    .btn-success:hover { background: #059669; }
    .btn-secondary { background: #1E293B; border: 1px solid #334155; color: #94A3B8; }
    .btn-secondary:hover { background: #334155; }
    .table-wrapper { 
      background: #1E293B; 
      border-radius: 12px; 
      border: 1px solid #334155; 
      padding: 20px; 
      margin-bottom: 20px;
      overflow-x: auto;
    }
    table { 
      width: 100%; 
      border-collapse: collapse; 
      font-size: 12px;
    }
    th { 
      background: #1a2640; 
      color: #94A3B8; 
      padding: 10px; 
      text-align: center;
      border-bottom: 2px solid #334155;
      font-weight: 700;
    }
    td { 
      padding: 8px; 
      border-bottom: 1px solid #1a2640; 
      text-align: center;
    }
    tr:nth-child(odd) { background: #0e1a2e; }
    tr:nth-child(even) { background: #0A1120; }
    input[type="text"], input[type="number"], input[type="date"], textarea {
      background: #0F172A;
      border: 1px solid #334155;
      color: #E2E8F0;
      padding: 8px 12px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 13px;
    }
    input[type="text"]:focus, input[type="number"]:focus, input[type="date"]:focus, textarea:focus {
      outline: none;
      border-color: #3B82F6;
      background: #1E293B;
    }
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 200;
    }
    .modal-content {
      background: #1E293B;
      border-radius: 16px;
      border: 1px solid #334155;
      width: 100%;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 24px;
    }
    .modal-close { float: right; cursor: pointer; font-size: 24px; color: #64748B; }
    .modal h2 { font-size: 16px; margin-bottom: 16px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; color: #94A3B8; margin-bottom: 6px; }
    .error { background: #450a0a; color: #FCA5A5; padding: 10px; border-radius: 6px; margin-bottom: 10px; border: 1px solid #7f1d1d; }
    .success { background: #065f46; color: #86EFAC; padding: 10px; border-radius: 6px; margin-bottom: 10px; border: 1px solid #166534; }
    .month-label { 
      background: #131f35; 
      color: #60A5FA; 
      padding: 8px 12px; 
      font-weight: 700;
      font-size: 11px;
    }
    .total-row { background: #152244 !important; }
    .grand-total { background: #0d2318 !important; color: #34D399; font-weight: 800; }
    input.cell-edit { width: 50px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📊 ตารางสรุปข้อมูล</h1>
      <div class="controls">
        <button class="btn-primary" onclick="toggleView()">📋 สลับมุมมอง</button>
        <button class="btn-success" onclick="openImport()">🤖 นำเข้าจากรูป/ไฟล์</button>
        <button class="btn-secondary" onclick="openSettings(1)">⚙️ ตั้งค่าตารางที่ 1</button>
        <button class="btn-secondary" onclick="openSettings(2)">⚙️ ตั้งค่าตารางที่ 2</button>
      </div>
    </header>

    <div id="table1Container"></div>
    <div id="table2Container"></div>
  </div>

  <!-- Import Modal -->
  <div id="importModal" class="modal" style="display:none;">
    <div class="modal-content">
      <span class="modal-close" onclick="closeImport()">×</span>
      <h2>🤖 นำเข้าข้อมูลจากรูปหรือไฟล์</h2>
      <div id="importError"></div>
      
      <div class="form-group">
        <label>อัปโหลดรูป JPEG/PNG หรือ Excel/CSV:</label>
        <input type="file" id="importFile" accept=".xlsx,.xls,.csv,.jpg,.jpeg,.png" onchange="handleFileUpload(event)">
      </div>

      <div class="form-group">
        <label>หรือวางข้อความตรงนี้:</label>
        <textarea id="importText" style="width:100%; height:120px; min-height:120px;" placeholder="วางข้อมูลจากตาราง"></textarea>
      </div>

      <div class="form-group">
        <label>เลือกตารางปลายทาง:</label>
        <select id="targetTable" style="background: #0F172A; border: 1px solid #334155; color: #E2E8F0; padding: 8px; border-radius: 6px; width: 100%;">
          <option value="1">ตารางที่ 1</option>
          <option value="2">ตารางที่ 2</option>
        </select>
      </div>

      <button class="btn-primary" onclick="analyzeImport()" style="width: 100%;">✨ วิเคราะห์และนำเข้า</button>
      <button class="btn-secondary" onclick="closeImport()" style="width: 100%; margin-top: 10px;">ยกเลิก</button>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="modal" style="display:none;">
    <div class="modal-content">
      <span class="modal-close" onclick="closeSettings()">×</span>
      <h2>⚙️ ตั้งค่าตาราง</h2>
      
      <div class="form-group">
        <label>ชื่อตาราง:</label>
        <input type="text" id="settingsTitle">
      </div>

      <div id="settingsContent"></div>

      <button class="btn-primary" onclick="saveSettings()" style="width: 100%;">✅ บันทึก</button>
      <button class="btn-secondary" onclick="closeSettings()" style="width: 100%; margin-top: 10px;">ยกเลิก</button>
    </div>
  </div>

  <script>
    // Data
    let data = {
      1: {
        title: 'ตารางที่ 1',
        groups: [
          {id: 'g1', label: 'Non-b', color: '#3B82F6'},
          {id: 'g2', label: 'Non-o', color: '#8B5CF6'},
          {id: 'g3', label: 'Non-ed', color: '#10B981'},
          {id: 'g4', label: 'อื่นๆ', color: '#F59E0B'}
        ],
        cols: [
          {id: 'c1', label: 'รับ'},
          {id: 'c2', label: 'ออก'}
        ],
        rows: []
      },
      2: {
        title: 'บันทึกที่พัก/ท้องถิ่น',
        groups: [
          {id: 'g1', label: 'โรงแรม', color: '#3B82F6'},
          {id: 'g2', label: 'เกสเฮ้า', color: '#8B5CF6'},
          {id: 'g3', label: 'หอพัก', color: '#10B981'},
          {id: 'g4', label: 'อพารทเม้น', color: '#F59E0B'},
          {id: 'g5', label: 'คอนโด', color: '#EF4444'},
          {id: 'g6', label: 'ท้องถิ่น', color: '#EC4899'}
        ],
        cols: [
          {id: 'c1', label: 'จำนวน'}
        ],
        rows: []
      }
    };

    let currentView = 'table';
    let currentSettingsTable = null;
    let idCounter = 1000;

    function genId() { return String(++idCounter); }

    const MONTH_SHORT = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
    const THAI_MONTHS = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];

    function formatThai(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return `${d.getDate()} ${MONTH_SHORT[d.getMonth()]} ${d.getFullYear() + 543}`;
    }

    function getMonthKey(dateStr) { return dateStr.slice(0, 7); }

    function getMonthLabel(key) {
      const [y, m] = key.split('-');
      return `${THAI_MONTHS[parseInt(m) - 1]} ${parseInt(y) + 543}`;
    }

    function renderTables() {
      const t1 = data[1];
      const t2 = data[2];
      
      document.getElementById('table1Container').innerHTML = renderTable(1, t1);
      document.getElementById('table2Container').innerHTML = renderTable(2, t2);
    }

    function renderTable(tableId, config) {
      const rows = config.rows.sort((a,b) => a.date.localeCompare(b.date));
      const grouped = {};
      rows.forEach(r => {
        const k = getMonthKey(r.date);
        if(!grouped[k]) grouped[k] = [];
        grouped[k].push(r);
      });

      const monthKeys = Object.keys(grouped).sort();
      const colCount = config.groups.length * config.cols.length;

      let html = `<div class="table-wrapper">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
          <h3 style="margin:0; font-size:15px;">${config.title} (${rows.length} รายการ)</h3>
          <div style="display:flex; gap:8px;">
            <button class="btn-primary" onclick="addRow(${tableId})">+ แถว</button>
            <button class="btn-success" onclick="exportTable(${tableId})">⬇ Excel</button>
          </div>
        </div>
        <table>
          <thead>
            <tr>
              <th style="text-align:left; min-width:100px;">วันที่</th>
              ${config.groups.map((g,gi) => `<th colspan="${config.cols.length}" style="color:${g.color};">${g.label}</th>`).join('')}
              <th style="width:40px;"></th>
            </tr>
            <tr>
              <th></th>
              ${config.groups.flatMap((g,gi) => config.cols.map(c => `<th style="background:${g.color}0a; font-size:10px;">${c.label}</th>`)).join('')}
              <th></th>
            </tr>
          </thead>
          <tbody>
      `;

      if(monthKeys.length === 0) {
        html += `<tr><td colspan="${colCount+2}" style="text-align:center; color:#64748B;">ยังไม่มีข้อมูล</td></tr>`;
      } else {
        monthKeys.forEach(mk => {
          const mrows = grouped[mk];
          const mTotals = Array(colCount).fill(0);
          mrows.forEach(r => r.values?.forEach((v,i) => mTotals[i]+=v));

          html += `<tr><td colspan="${colCount+2}" class="month-label">📅 ${getMonthLabel(mk)}</td></tr>`;
          
          mrows.forEach((row,ri) => {
            html += `<tr style="background:${ri%2===0?'#0e1a2e':'#0A1120'};">
              <td style="text-align:left; color:#94A3B8;">${formatThai(row.date)}</td>
              ${row.values?.map((v,i) => {
                const gi = Math.floor(i / config.cols.length);
                const g = config.groups[gi];
                return `<td><input type="number" min="0" value="${v}" onchange="updateCell(${tableId}, '${row.id}', ${i}, this.value)" class="cell-edit" style="background:${v>0?g.color+'25':'transparent'}; border:none; color:${v>0?g.color:'#3d4f6a'}; font-weight:${v>0?700:400};"></td>`;
              }).join('')}
              <td><button style="background:none; border:none; color:#EF4444; cursor:pointer; font-size:16px;" onclick="deleteRow(${tableId}, '${row.id}')">×</button></td>
            </tr>`;
          });

          html += `<tr class="total-row">
            <td style="color:#93C5FD;">รวม</td>
            ${mTotals.map(t => `<td style="color:#93C5FD; font-weight:700;">${t}</td>`).join('')}
            <td></td>
          </tr>`;
        });
      }

      // Grand total
      const grandTotals = Array(colCount).fill(0);
      rows.forEach(r => r.values?.forEach((v,i) => grandTotals[i]+=v));

      html += `<tr class="grand-total">
        <td>รวมทั้งหมด</td>
        ${grandTotals.map(t => `<td>${t}</td>`).join('')}
        <td></td>
      </tr>`;

      html += `</tbody></table></div>`;
      return html;
    }

    function updateCell(tableId, rowId, colIdx, value) {
      const row = data[tableId].rows.find(r => r.id === rowId);
      if(row) row.values[colIdx] = parseInt(value) || 0;
      renderTables();
    }

    function deleteRow(tableId, rowId) {
      data[tableId].rows = data[tableId].rows.filter(r => r.id !== rowId);
      renderTables();
    }

    function addRow(tableId) {
      const date = prompt('วันที่ (YYYY-MM-DD):');
      if(!date) return;
      const colCount = data[tableId].groups.length * data[tableId].cols.length;
      data[tableId].rows.push({
        id: genId(),
        date: date,
        values: Array(colCount).fill(0)
      });
      renderTables();
    }

    function exportTable(tableId) {
      const config = data[tableId];
      const rows = config.rows.sort((a,b) => a.date.localeCompare(b.date));
      
      const headers = ['วันที่', ...config.groups.flatMap(g => config.cols.map(c => `${g.label} ${c.label}`))];
      const csvData = [
        headers,
        ...rows.map(r => [formatThai(r.date), ...r.values]),
      ];

      const totals = Array(config.groups.length * config.cols.length).fill(0);
      rows.forEach(r => r.values?.forEach((v,i) => totals[i]+=v));
      csvData.push(['รวมทั้งหมด', ...totals]);

      const csv = csvData.map(row => row.map(v => `"${v}"`).join(',')).join('\n');
      const link = document.createElement('a');
      link.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent('\ufeff' + csv);
      link.download = `${config.title}.csv`;
      link.click();
    }

    function toggleView() {
      currentView = currentView === 'table' ? 'summary' : 'table';
      renderTables();
    }

    function openImport() {
      document.getElementById('importModal').style.display = 'flex';
    }

    function closeImport() {
      document.getElementById('importModal').style.display = 'none';
      document.getElementById('importError').innerHTML = '';
      document.getElementById('importText').value = '';
      document.getElementById('importFile').value = '';
    }

    async function handleFileUpload(e) {
      const file = e.target.files[0];
      if(!file) return;

      const ext = file.name.split('.').pop().toLowerCase();
      
      try {
        if(['xlsx','xls','csv'].includes(ext)) {
          const reader = new FileReader();
          reader.onload = (ev) => {
            document.getElementById('importText').value = ev.target.result;
          };
          reader.readAsText(file);
        } else if(['jpg','jpeg','png'].includes(ext)) {
          showError('กรุณาวางข้อความจากรูปลงในช่องข้างล่าง หรือใช้เครื่องมือออนไลน์แปลงรูปเป็นข้อความก่อน');
        }
      } catch(e) {
        showError('อ่านไฟล์ไม่ได้: ' + e.message);
      }
    }

    function showError(msg) {
      document.getElementById('importError').innerHTML = `<div class="error">${msg}</div>`;
    }

        // ==== Helper: แปลงข้อความ ตม. เป็นข้อมูลตาราง (พ.ศ. เสมอ ไม่แปลงเป็น ค.ศ.) ====

    function pad2(n) { return String(n).padStart(2, '0'); }

    function getMonthIndex(raw) {
      const stripped = raw.replace(/\./g, '');
      const shortMap = {'มค':0,'กพ':1,'มีค':2,'เมย':3,'พค':4,'มิย':5,'กค':6,'สค':7,'กย':8,'ตค':9,'พย':10,'ธค':11};
      if (shortMap[stripped] !== undefined) return shortMap[stripped];
      const fullMap = {'มกราคม':0,'กุมภาพันธ์':1,'มีนาคม':2,'เมษายน':3,'พฤษภาคม':4,'มิถุนายน':5,'กรกฎาคม':6,'สิงหาคม':7,'กันยายน':8,'ตุลาคม':9,'พฤศจิกายน':10,'ธันวาคม':11};
      if (fullMap[raw] !== undefined) return fullMap[raw];
      return undefined;
    }

    function toBuddhistYear(yearRaw) {
      if (!yearRaw) {
        const now = new Date();
        return now.getFullYear() + 543;
      }
      const y = parseInt(yearRaw);
      if (yearRaw.length <= 2) return 2500 + y;
      if (y > 2400) return y;
      return y + 543;
    }

    function findDateBE(text) {
      const dateRegex = /(\d{1,2})\s*(ม\.?ค\.?|ก\.?พ\.?|มี\.?ค\.?|เม\.?ย\.?|พ\.?ค\.?|มิ\.?ย\.?|ก\.?ค\.?|ส\.?ค\.?|ก\.?ย\.?|ต\.?ค\.?|พ\.?ย\.?|ธ\.?ค\.?|มกราคม|กุมภาพันธ์|มีนาคม|เมษายน|พฤษภาคม|มิถุนายน|กรกฎาคม|สิงหาคม|กันยายน|ตุลาคม|พฤศจิกายน|ธันวาคม)\.?\s*(\d{2,4})?/;
      const m = text.match(dateRegex);
      if (!m) return '';
      const day = parseInt(m[1]);
      const monthIdx = getMonthIndex(m[2]);
      if (monthIdx === undefined) return '';
      const beYear = toBuddhistYear(m[3]);
      return `${beYear}-${pad2(monthIdx + 1)}-${pad2(day)}`;
    }

    function extractValuesByLabel(text, groups, cols) {
      const escapeRegex = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const values = [];
      const missing = [];
      for (const g of groups) {
        for (const c of cols) {
          const gEsc = escapeRegex(g.label);
          const cEsc = escapeRegex(c.label);
          const regex = new RegExp(gEsc + '\\s*\\(\\s*' + cEsc + '\\s*\\)\\s*(?:เท่ากับ|=|:)?\\s*(-?\\d+(?:\\.\\d+)?)', 'i');
          const m = text.match(regex);
          if (m) {
            values.push(parseFloat(m[1]));
          } else {
            values.push(0);
            missing.push(`${g.label} (${c.label})`);
          }
        }
      }
      return { values, missing };
    }

    function analyzeImport() {
      const text = document.getElementById('importText').value;
      const tableId = parseInt(document.getElementById('targetTable').value);

      if (!text.trim()) {
        showError('กรุณาใส่ข้อมูล');
        return;
      }

      const groups = data[tableId].groups;
      const cols = data[tableId].cols;

      const dateStr = findDateBE(text);
      const { values, missing } = extractValuesByLabel(text, groups, cols);

      if (missing.length === groups.length * cols.length) {
        showError(
          'ไม่พบข้อมูลที่ตรงกับรูปแบบ กรุณาใส่ข้อความในรูปแบบ เช่น:' +
          groups.map(g => cols.map(c => `${g.label} (${c.label}) เท่ากับ ตัวเลข`).join(', ')).join(', ')
        );
        return;
      }

      const newRow = { id: genId(), date: dateStr, values: values };
      data[tableId].rows.push(newRow);
      renderTables();
      closeImport();

      let warn = '';
      if (!dateStr) warn += 'ไม่พบวันที่ในข้อความ กรุณาแก้ไขวันที่ในตารางเอง';
      if (missing.length > 0) warn += `ไม่พบข้อมูลของ: ${missing.join(', ')} (ตั้งค่าเป็น 0 ให้แล้ว)`;
      if (warn) alert('⚠️ ' + warn);
    }

    function openSettings(tableId) {
      currentSettingsTable = tableId;
      const config = data[tableId];
      document.getElementById('settingsTitle').value = config.title;
      
      let html = `
        <div class="form-group">
          <label>กลุ่ม:</label>
          <div id="groupsList"></div>
          <button class="btn-primary" onclick="addGroup()" style="margin-top:8px;">+ เพิ่มกลุ่ม</button>
        </div>

        <div class="form-group">
          <label>คอลัมน์:</label>
          <div id="colsList"></div>
          <button class="btn-primary" onclick="addCol()" style="margin-top:8px;">+ เพิ่มคอลัมน์</button>
        </div>
      `;

      document.getElementById('settingsContent').innerHTML = html;

      // Render groups
      let groupsHtml = '';
      config.groups.forEach((g, i) => {
        groupsHtml += `
          <div style="display:flex; gap:8px; margin-bottom:8px; align-items:center;">
            <input type="color" value="${g.color}" onchange="updateGroupColor(${i}, this.value)" style="width:40px; height:36px; border:none; border-radius:6px; cursor:pointer;">
            <input type="text" value="${g.label}" onchange="updateGroupLabel(${i}, this.value)" style="flex:1;">
            ${config.groups.length > 1 ? `<button class="btn-secondary" onclick="deleteGroup(${i})">ลบ</button>` : ''}
          </div>
        `;
      });
      document.getElementById('groupsList').innerHTML = groupsHtml;

      // Render cols
      let colsHtml = '';
      config.cols.forEach((c, i) => {
        colsHtml += `
          <div style="display:flex; gap:8px; margin-bottom:8px;">
            <input type="text" value="${c.label}" onchange="updateColLabel(${i}, this.value)" style="flex:1;">
            ${config.cols.length > 1 ? `<button class="btn-secondary" onclick="deleteCol(${i})">ลบ</button>` : ''}
          </div>
        `;
      });
      document.getElementById('colsList').innerHTML = colsHtml;

      document.getElementById('settingsModal').style.display = 'flex';
    }

    function closeSettings() {
      document.getElementById('settingsModal').style.display = 'none';
      currentSettingsTable = null;
    }

    function saveSettings() {
      const tableId = currentSettingsTable;
      const title = document.getElementById('settingsTitle').value;
      data[tableId].title = title;
      renderTables();
      closeSettings();
    }

    function addGroup() {
      if(!currentSettingsTable) return;
      data[currentSettingsTable].groups.push({
        id: genId(),
        label: 'กลุ่มใหม่',
        color: '#6B7280'
      });
      // Adjust all rows
      data[currentSettingsTable].rows.forEach(r => {
        r.values.push(0);
      });
      openSettings(currentSettingsTable);
    }

    function addCol() {
      if(!currentSettingsTable) return;
      data[currentSettingsTable].cols.push({
        id: genId(),
        label: 'คอลัมน์ใหม่'
      });
      // Adjust all rows
      const colCount = data[currentSettingsTable].groups.length;
      data[currentSettingsTable].rows.forEach(r => {
        for(let i=0; i<colCount; i++) r.values.push(0);
      });
      openSettings(currentSettingsTable);
    }

    function updateGroupColor(idx, color) {
      data[currentSettingsTable].groups[idx].color = color;
    }

    function updateGroupLabel(idx, label) {
      data[currentSettingsTable].groups[idx].label = label;
    }

    function updateColLabel(idx, label) {
      data[currentSettingsTable].cols[idx].label = label;
    }

    function deleteGroup(idx) {
      if(data[currentSettingsTable].groups.length <= 1) return;
      data[currentSettingsTable].groups.splice(idx, 1);
      openSettings(currentSettingsTable);
    }

    function deleteCol(idx) {
      if(data[currentSettingsTable].cols.length <= 1) return;
      data[currentSettingsTable].cols.splice(idx, 1);
      openSettings(currentSettingsTable);
    }

    // Initialize
    renderTables();
  </script>
</body>
</html>
