<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ตารางสรุปข้อมูล</title>
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #1e293b; padding: 20px; border-radius: 12px; }
        .controls { margin-bottom: 20px; }
        button { padding: 10px 20px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; }
        textarea { width: 100%; height: 100px; background: #0f172a; color: white; border: 1px solid #334155; padding: 10px; margin-top: 10px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #334155; text-align: center; }
        th { background: #334155; }
    </style>
</head>
<body>
    <div class="container">
        <div class="controls">
            <button onclick="document.getElementById('importModal').style.display='flex'">🤖 นำเข้าข้อมูล</button>
        </div>
        <table id="table1">
            <thead><tr><th>วันที่</th><th>ค่า</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
    <div id="importModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); align-items:center; justify-content:center;">
        <div style="background:#1e293b; padding:20px; border-radius:12px; width:400px;">
            <textarea id="importText" placeholder="วางข้อมูลที่นี่..."></textarea>
            <button onclick="analyzeImport()">✨ วิเคราะห์ด้วย AI</button>
            <button onclick="document.getElementById('importModal').style.display='none'">ปิด</button>
            <div id="importError" style="color:#f87171; margin-top:10px;"></div>
        </div>
    </div>
    <script>
        async function analyzeImport() {
            const text = document.getElementById('importText').value;
            const errorDiv = document.getElementById('importError');
            const API_KEY = "AQ.Ab8RN6KbwAvJDEgx1FZ-XYklc2WXUsEZytm7fK710xci2v18eQ"; // <--- ใส่รหัสตรงนี้
            errorDiv.innerText = '🔄 กำลังวิเคราะห์...';
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "แปลงข้อมูลเป็น JSON array (date YYYY-MM-DD, values array): " + text }] }] })
                });
                const data = await res.json();
                const json = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim());
                const tbody = document.querySelector('#table1 tbody');
                json.forEach(p => {
                    const row = tbody.insertRow();
                    row.insertCell(0).innerText = p.date;
                    row.insertCell(1).innerText = p.values.join(', ');
                });
                document.getElementById('importModal').style.display = 'none';
            } catch(e) { errorDiv.innerText = 'Error: ' + e.message; }
        }
    </script>
</body>
</html>
